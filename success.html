<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Confirmed — RemoteMedicalJobs</title>
    <meta name="robots" content="noindex,nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:Inter,system-ui,sans-serif;background:#f8fafc;color:#1e293b;line-height:1.6}
        .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0}
        .nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:72px;display:flex;align-items:center;justify-content:space-between}
        .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;font-weight:700;color:#1e3a8a}
        .nav-logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#059669);color:#fff;display:flex;align-items:center;justify-content:center}
        .nav-logo span{color:#059669}
        .nav-links{display:flex;gap:4px;list-style:none}
        .nav-links a{text-decoration:none;color:#475569;font-size:.875rem;font-weight:500;padding:8px 14px;border-radius:8px}
        .nav-links a:hover{background:#eff6ff;color:#1d4ed8}
        .container{max-width:640px;margin:110px auto 60px;padding:0 24px}
        .card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:40px;box-shadow:0 10px 25px rgba(0,0,0,.06);text-align:center}
        .icon-ok{width:80px;height:80px;border-radius:50%;background:#ecfdf5;color:#059669;display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto 20px}
        .icon-err{width:80px;height:80px;border-radius:50%;background:#fef2f2;color:#dc2626;display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto 20px}
        h1{font-size:1.75rem;font-weight:800;margin-bottom:10px}
        .desc{color:#64748b;margin-bottom:28px}
        .receipt{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:20px 24px;text-align:left;margin-bottom:28px}
        .row{display:flex;justify-content:space-between;gap:12px;padding:8px 0;font-size:.9rem;flex-wrap:wrap}
        .label{color:#64748b}
        .value{font-weight:600;color:#1e293b;word-break:break-all}
        .steps{text-align:left;margin-bottom:28px}
        .steps h3{font-size:1rem;font-weight:700;margin-bottom:14px}
        .step{display:flex;gap:12px;margin-bottom:12px}
        .n{width:28px;height:28px;border-radius:50%;background:#eff6ff;color:#2563eb;font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 24px;border-radius:10px;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:inherit;font-size:.9rem}
        .btn-green{background:linear-gradient(135deg,#059669,#047857);color:#fff}
        .btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
        .btn-secondary{background:#fff;color:#1d4ed8;border:1.5px solid #bfdbfe}
        .upsell{margin-top:24px;padding:20px;border-radius:14px;background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #fcd34d;text-align:left}
        .upsell h4{font-size:.95rem;font-weight:800;color:#92400e;margin-bottom:6px}
        .upsell p{font-size:.85rem;color:#78350f;margin-bottom:12px}
        .footer{text-align:center;padding:24px;color:#94a3b8;font-size:.78rem}
        .footer a{color:#64748b;margin:0 8px}
        @media(max-width:700px){.nav-links{display:none}}
    </style>
</head>
<body>
<div id="site-header" data-active="success" data-pad="false"></div>

<div class="container">
    <div class="card" id="card">
        <div class="icon-ok"><span class="iconify" data-icon="mdi:loading" style="animation:spin 1s linear infinite"></span></div>
        <h1>Confirming payment…</h1>
        <p class="desc">Please wait a moment.</p>
    </div>
</div>

<div id="site-footer"></div>
    <script src="/js/chrome.js"></script>
<script>
const _y = document.getElementById('y'); if (_y) _y.textContent = new Date().getFullYear();

function esc(s){
    const d = document.createElement('div');
    d.textContent = s ?? '';
    return d.innerHTML;
}

function el(tag, attrs, children){
    const node = document.createElement(tag);
    if(attrs){
        Object.entries(attrs).forEach(([k,v])=>{
            if(k==='className') node.className = v;
            else if(k==='text') node.textContent = v;
            else if(k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
            else node.setAttribute(k, v);
        });
    }
    (children||[]).forEach(c=>{
        if(typeof c === 'string') node.appendChild(document.createTextNode(c));
        else if(c) node.appendChild(c);
    });
    return node;
}

async function init(){
    const params = new URLSearchParams(location.search);
    const failed = params.get('failed') === 'true';
    const reference = params.get('reference') || '';
    const token = params.get('token') || '';
    const card = document.getElementById('card');
    card.innerHTML = '';

    if(failed){
        card.appendChild(el('div',{className:'icon-err'},[el('span',{className:'iconify','data-icon':'mdi:alert-circle-outline'})]));
        card.appendChild(el('h1',{text:'Payment not completed', style:'color:#dc2626'}));
        card.appendChild(el('p',{className:'desc', text:'No charge was finalized. You can try checkout again — your details are safe.'}));
        if(reference){
            const rec = el('div',{className:'receipt'});
            rec.innerHTML = `<div class="row"><span class="label">Reference</span><span class="value">${esc(reference)}</span></div>`;
            card.appendChild(rec);
        }
        const actions = el('div',{className:'actions'});
        actions.appendChild(el('a',{className:'btn btn-primary', href:'course.html', text:'Try checkout again'}));
        actions.appendChild(el('a',{className:'btn btn-secondary', href:'jobs.html', text:'Browse jobs free'}));
        card.appendChild(actions);
        return;
    }

    let studentName = 'there';
    let email = '';
    let productName = 'Remote Healthcare Career Accelerator';
    let amount = '27.00';
    let accessHref = token ? ('course-access.html?token=' + encodeURIComponent(token)) : 'course.html';

    if(token){
        try{
            const res = await fetch('/api/course/access?token=' + encodeURIComponent(token));
            const json = await res.json();
            if(res.ok && json.status){
                studentName = json.data.student.first_name || studentName;
                email = json.data.student.email || '';
                productName = json.data.product.name || productName;
                amount = Number(json.data.product.amount).toFixed(2);
            }
        }catch(e){/* still show generic success */}
    }

    card.appendChild(el('div',{className:'icon-ok'},[el('span',{className:'iconify','data-icon':'mdi:checkbox-marked-circle-outline'})]));
    const title = el('h1');
    title.textContent = `You're in, ${studentName}!`;
    card.appendChild(title);
    const desc = el('p',{className:'desc'});
    desc.textContent = `Payment confirmed. Your course access link has been emailed${email ? ' to ' + email : ''}. You can open the portal now.`;
    card.appendChild(desc);

    const rec = el('div',{className:'receipt'});
    rec.innerHTML = `
        <div class="row"><span class="label">Product</span><span class="value">${esc(productName)}</span></div>
        <div class="row"><span class="label">Amount</span><span class="value">$${esc(amount)} USD</span></div>
        <div class="row"><span class="label">Reference</span><span class="value">${esc(reference || '—')}</span></div>
        <div class="row"><span class="label">Delivery</span><span class="value">Email + online portal</span></div>
    `;
    card.appendChild(rec);

    const steps = el('div',{className:'steps'});
    steps.innerHTML = `
        <h3>What happens next</h3>
        <div class="step"><div class="n">1</div><div><strong>Check your inbox</strong> for the course access email (and spam folder).</div></div>
        <div class="step"><div class="n">2</div><div><strong>Open the portal</strong> and complete Module 1 today.</div></div>
        <div class="step"><div class="n">3</div><div><strong>Update your CV</strong> with the remote template, then apply on the job board.</div></div>
    `;
    card.appendChild(steps);

    const actions = el('div',{className:'actions'});
    const start = el('a',{className:'btn btn-green', href: accessHref});
    start.innerHTML = '<span class="iconify" data-icon="mdi:play-circle-outline"></span> Open course portal';
    actions.appendChild(start);
    actions.appendChild(el('a',{className:'btn btn-secondary', href:'jobs.html', text:'Browse remote jobs'}));
    if(reference){
        const resendBtn = el('button',{className:'btn btn-secondary', type:'button', text:'Resend email'});
        resendBtn.addEventListener('click', async ()=>{
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending…';
            try{
                const r = await fetch('/api/course/resend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reference})});
                const j = await r.json();
                alert(j.message || 'Done');
            }catch(e){ alert('Could not resend.'); }
            resendBtn.disabled = false;
            resendBtn.textContent = 'Resend email';
        });
        actions.appendChild(resendBtn);
    }
    card.appendChild(actions);

    // Monetization: soft upsell to Pro if they bought standard (detected by amount)
    if(Number(amount) <= 27){
        const up = el('div',{className:'upsell'});
        up.innerHTML = `
            <h4>Want faster results? Upgrade to Pro ($47)</h4>
            <p>Add priority job-alert tactics, advanced interview bank, and LinkedIn checklist. Purchase Pro anytime from the course page — contact support to upgrade an existing enrollment.</p>
            <a class="btn btn-primary" href="course.html?product=pro" style="display:inline-flex">See Pro benefits</a>
        `;
        card.appendChild(up);
    }
}

document.addEventListener('DOMContentLoaded', init);
</script>
<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
</body>
</html>
